<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">사내 도구 가이드 인포그래픽 예시</title>
  <desc id="desc">Teams, Outlook, SharePoint, OneDrive 사용 목적을 네 영역으로 정리한 인포그래픽</desc>
  <rect width="1200" height="675" fill="#f7fbff"/>
  <text x="600" y="86" text-anchor="middle" font-family="Malgun Gothic, Segoe UI, sans-serif" font-size="44" font-weight="800" fill="#172033">어떤 도구를 언제 쓰나요?</text>
  <text x="600" y="126" text-anchor="middle" font-family="Malgun Gothic, Segoe UI, sans-serif" font-size="23" fill="#667085">신입사원을 위한 업무 도구 빠른 가이드</text>
  <g font-family="Malgun Gothic, Segoe UI, sans-serif">
    <g transform="translate(128 172)"><rect width="430" height="180" rx="28" fill="#ecfeff" stroke="#99f6e4" stroke-width="4"/><circle cx="86" cy="88" r="45" fill="#14b8a6"/><text x="86" y="104" text-anchor="middle" font-size="44" fill="#fff">T</text><text x="154" y="72" font-size="31" font-weight="800" fill="#115e59">Teams 채팅</text><text x="154" y="115" font-size="22" fill="#115e59">빠른 대화와 실시간 협업</text></g>
    <g transform="translate(642 172)"><rect width="430" height="180" rx="28" fill="#eff6ff" stroke="#bfdbfe" stroke-width="4"/><circle cx="86" cy="88" r="45" fill="#2563eb"/><text x="86" y="104" text-anchor="middle" font-size="44" fill="#fff">O</text><text x="154" y="72" font-size="31" font-weight="800" fill="#1d4ed8">Outlook 이메일</text><text x="154" y="115" font-size="22" fill="#1d4ed8">공식 소통과 외부 커뮤니케이션</text></g>
    <g transform="translate(128 398)"><rect width="430" height="180" rx="28" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="4"/><circle cx="86" cy="88" r="45" fill="#7c3aed"/><text x="86" y="104" text-anchor="middle" font-size="44" fill="#fff">S</text><text x="154" y="72" font-size="31" font-weight="800" fill="#5b21b6">SharePoint</text><text x="154" y="115" font-size="22" fill="#5b21b6">팀 공유 문서와 지식 저장소</text></g>
    <g transform="translate(642 398)"><rect width="430" height="180" rx="28" fill="#fff7ed" stroke="#fdba74" stroke-width="4"/><circle cx="86" cy="88" r="45" fill="#ea580c"/><text x="86" y="104" text-anchor="middle" font-size="44" fill="#fff">1</text><text x="154" y="72" font-size="31" font-weight="800" fill="#c2410c">OneDrive</text><text x="154" y="115" font-size="22" fill="#c2410c">개인 작업과 초안 관리</text></g>
  </g>
</svg>